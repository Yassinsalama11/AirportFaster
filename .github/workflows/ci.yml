name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'

jobs:
  ci:
    name: Install, Lint, Typecheck, Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: airportfaster
          POSTGRES_PASSWORD: airportfaster
          POSTGRES_DB: airportfaster_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://airportfaster:airportfaster@localhost:5432/airportfaster_test
      NEXT_PUBLIC_API_URL: http://localhost:3001
      SKIP_ENV_VALIDATION: '1'
      AIRPORTFASTER_FREEZE_NON_MVP: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @airportfaster/db exec prisma generate

      - name: Apply database migrations
        run: pnpm --filter @airportfaster/db exec prisma migrate deploy

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
