[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @airportfaster/db exec prisma generate && pnpm --filter @airportfaster/api build"

[deploy]
startCommand = "node packages/api/dist/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
