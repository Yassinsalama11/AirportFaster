[build]
builder = "NIXPACKS"
buildCommand = "pnpm --filter @airportfaster/db exec prisma generate && pnpm --filter @airportfaster/db build && pnpm --filter @airportfaster/shared build && pnpm --filter @airportfaster/api build"

[deploy]
startCommand = "for i in 1 2 3 4 5 6; do pnpm --filter @airportfaster/db exec prisma migrate deploy && break || sleep 5; done; pnpm --filter @airportfaster/db db:seed || true; node packages/api/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
